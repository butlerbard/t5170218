<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采舍食堂 點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
        /* 自定義捲軸 */
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #ed8936; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-900">

    <!-- 導覽列 -->
    <header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-orange-600 flex items-center gap-2">
                <i data-lucide="shopping-cart" class="w-6 h-6"></i> 采舍食堂
            </h1>
            <div class="flex gap-2">
                <button onclick="switchView('menu')" id="btn-menu" class="px-4 py-2 rounded-full text-sm font-medium transition-colors bg-orange-600 text-white shadow-md">
                    我要點餐
                </button>
                <button onclick="switchView('admin')" id="btn-admin" class="px-4 py-2 rounded-full text-sm font-medium transition-colors hover:bg-gray-100 text-gray-600">
                    訂單管理
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 p-4 md:p-6 max-w-4xl mx-auto w-full">
        <!-- 提示訊息區 -->
        <div id="message-box" class="hidden mb-4 p-4 rounded-lg text-white text-center animate-bounce shadow-lg"></div>

        <!-- 點餐頁面 -->
        <div id="view-menu" class="space-y-8">
            <section>
                <h2 class="text-lg font-bold mb-4 border-l-4 border-orange-500 pl-3">精選飯類</h2>
                <div id="rice-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 由 JS 動態生成 -->
                </div>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4 border-l-4 border-orange-500 pl-3">美味麵食</h2>
                <div id="noodles-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 由 JS 動態生成 -->
                </div>
            </section>
        </div>

        <!-- 管理頁面 (純前端模擬) -->
        <div id="view-admin" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="clipboard-list" class="w-6 h-6"></i> 本次會話訂單
                </h2>
                <span class="text-xs text-green-600 flex items-center gap-1 font-medium">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> 本地運行模式
                </span>
            </div>
            <div id="orders-list" class="space-y-4">
                <!-- 訂單將在此顯示 -->
                <div class="text-center py-12 text-gray-500 italic">尚未收到任何訂單</div>
            </div>
        </div>
    </main>

    <!-- 底部購物車欄 -->
    <div id="cart-footer" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-30 animate-slide-up">
        <div class="max-w-4xl mx-auto flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <i data-lucide="shopping-basket" class="w-8 h-8 text-orange-600"></i>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">當前小計</p>
                        <p id="cart-total" class="text-xl font-bold text-orange-600">$0</p>
                    </div>
                </div>
                <button onclick="submitOrder()" id="btn-submit" class="bg-orange-600 text-white px-8 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-orange-700 active:scale-95 transition-all shadow-lg shadow-orange-200">
                    確認送出 <i data-lucide="check" class="w-5 h-5"></i>
                </button>
            </div>
            <!-- 購物車清單 -->
            <div id="cart-items" class="max-h-32 overflow-y-auto space-y-2 border-t pt-2 scrollbar-thin"></div>
        </div>
    </div>

    <!-- 底部緩衝 -->
    <div id="footer-spacer" class="hidden h-48"></div>

    <script>
        // 菜單資料
        const MENU_DATA = {
            rice: [
                { id: 'r1', name: '泰式越香雞飯', price: 125 },
                { id: 'r2', name: '椰汁咖哩雞飯', price: 120 },
                { id: 'r3', name: '打拋豬肉飯', price: 100 },
                { id: 'r4', name: '日式燒肉飯', price: 115 },
                { id: 'r5', name: '蜜汁豬排飯', price: 100 },
                { id: 'r6', name: '香雞排飯(咖哩/泰式/椒麻)', price: 110 },
                { id: 'r7', name: '椒麻雞排飯', price: 120 },
                { id: 'r8', name: '控肉飯', price: 100 },
            ],
            noodles: [
                { id: 'n1', name: '越式牛肉河粉', price: 120 },
                { id: 'n2', name: '海鮮什錦河粉', price: 120 },
                { id: 'n3', name: '海鮮什錦麵', price: 110 },
                { id: 'n4', name: '時蔬雞絲麵', price: 100 },
                { id: 'n5', name: '咖哩烏龍麵(牛/豬)', price: 100 },
                { id: 'n6', name: '咖啡椰香烏龍麵', price: 110 },
                { id: 'n7', name: '雞肉乾拌河粉(限量)', price: 100 },
            ]
        };

        let cart = {};
        let localOrders = []; // 用來暫存本次開啟網頁後的訂單

        // 渲染菜單
        function renderMenu() {
            const riceContainer = document.getElementById('rice-list');
            const noodleContainer = document.getElementById('noodles-list');
            
            riceContainer.innerHTML = MENU_DATA.rice.map(item => createItemHTML(item)).join('');
            noodleContainer.innerHTML = MENU_DATA.noodles.map(item => createItemHTML(item)).join('');
            
            lucide.createIcons();
        }

        function createItemHTML(item) {
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center hover:border-orange-200 transition-all">
                    <div>
                        <h3 class="font-medium text-gray-800">${item.name}</h3>
                        <p class="text-orange-600 font-bold mt-1">$${item.price}</p>
                    </div>
                    <button onclick="addToCart('${item.id}', '${item.name}', ${item.price})" class="bg-orange-50 text-orange-600 p-2 rounded-lg hover:bg-orange-600 hover:text-white transition-all active:scale-90 shadow-sm">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
            `;
        }

        // 頁面切換
        window.switchView = (view) => {
            const menu = document.getElementById('view-menu');
            const admin = document.getElementById('view-admin');
            const btnMenu = document.getElementById('btn-menu');
            const btnAdmin = document.getElementById('btn-admin');

            if(view === 'menu') {
                menu.classList.remove('hidden');
                admin.classList.add('hidden');
                btnMenu.classList.add('bg-orange-600', 'text-white', 'shadow-md');
                btnAdmin.classList.remove('bg-orange-600', 'text-white', 'shadow-md');
                btnAdmin.classList.add('text-gray-600');
            } else {
                menu.classList.add('hidden');
                admin.classList.remove('hidden');
                btnAdmin.classList.add('bg-orange-600', 'text-white', 'shadow-md');
                btnMenu.classList.remove('bg-orange-600', 'text-white', 'shadow-md');
                btnMenu.classList.add('text-gray-600');
                renderOrders();
            }
        };

        // 購物車邏輯
        window.addToCart = (id, name, price) => {
            if(cart[id]) {
                cart[id].quantity += 1;
            } else {
                cart[id] = { id, name, price, quantity: 1 };
            }
            updateCartUI();
        };

        window.removeFromCart = (id) => {
            if(cart[id].quantity > 1) {
                cart[id].quantity -= 1;
            } else {
                delete cart[id];
            }
            updateCartUI();
        };

        function updateCartUI() {
            const footer = document.getElementById('cart-footer');
            const spacer = document.getElementById('footer-spacer');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            const itemsList = document.getElementById('cart-items');

            const itemsArray = Object.values(cart);
            if(itemsArray.length === 0) {
                footer.classList.add('hidden');
                spacer.classList.add('hidden');
                return;
            }

            footer.classList.remove('hidden');
            spacer.classList.remove('hidden');
            
            let totalQty = 0;
            let totalPrice = 0;
            itemsList.innerHTML = itemsArray.map(item => {
                totalQty += item.quantity;
                totalPrice += (item.price * item.quantity);
                return `
                    <div class="flex justify-between items-center text-sm bg-gray-50 p-2 rounded border border-gray-100">
                        <span class="font-medium">${item.name}</span>
                        <div class="flex items-center gap-3">
                            <button onclick="removeFromCart('${item.id}')" class="p-1 rounded-full bg-white border border-gray-200 hover:bg-red-50 hover:text-red-600"><i data-lucide="minus" class="w-3 h-3"></i></button>
                            <span class="font-bold w-4 text-center">${item.quantity}</span>
                            <button onclick="addToCart('${item.id}', '${item.name}', ${item.price})" class="p-1 rounded-full bg-white border border-gray-200 hover:bg-green-50 hover:text-green-600"><i data-lucide="plus" class="w-3 h-3"></i></button>
                        </div>
                    </div>
                `;
            }).join('');

            count.innerText = totalQty;
            total.innerText = `$${totalPrice}`;
            lucide.createIcons();
        }

        // 送出訂單 (純前端模擬)
        window.submitOrder = () => {
            const items = Object.values(cart);
            const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
            
            const newOrder = {
                id: Math.random().toString(36).substr(2, 9),
                timestamp: new Date(),
                items: items,
                total: total
            };

            localOrders.unshift(newOrder); // 加入本地列表最前面
            cart = {};
            updateCartUI();
            showMessage('🎉 訂單已模擬送出！可至管理頁查看。', 'success');
        };

        // 渲染歷史訂單
        function renderOrders() {
            const listContainer = document.getElementById('orders-list');
            if (localOrders.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-12 text-gray-500 italic">目前無歷史紀錄</div>';
                return;
            }

            listContainer.innerHTML = localOrders.map(order => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-orange-500 animate-slide-up">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] text-gray-400 font-mono uppercase">ID: ${order.id}</span>
                            <p class="text-sm font-semibold">${order.timestamp.toLocaleString()}</p>
                        </div>
                        <span class="bg-green-100 text-green-600 px-2 py-1 rounded text-xs font-bold tracking-wider">成功</span>
                    </div>
                    <div class="my-3 space-y-1 text-sm text-gray-700">
                        ${order.items.map(i => `<div class="flex justify-between"><span>${i.name} x${i.quantity}</span><span>$${i.price * i.quantity}</span></div>`).join('')}
                    </div>
                    <div class="border-t border-dashed pt-2 flex justify-between font-bold text-orange-600">
                        <span class="text-xs text-gray-400 font-normal">結帳金額</span>
                        <span>$${order.total}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showMessage(text, type) {
            const box = document.getElementById('message-box');
            box.innerText = text;
            box.className = `mb-4 p-4 rounded-lg text-white text-center animate-bounce shadow-lg z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }

        // 初始化執行
        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
