<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南洋風味點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-900">

    <!-- 導覽列 -->
    <header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-orange-600 flex items-center gap-2">
                <i data-lucide="shopping-cart" class="w-6 h-6"></i> 南洋風味點餐
            </h1>
            <div class="flex gap-2">
                <button onclick="switchView('menu')" id="btn-menu" class="px-4 py-2 rounded-full text-sm font-medium transition-colors bg-orange-600 text-white">
                    我要點餐
                </button>
                <button onclick="switchView('admin')" id="btn-admin" class="px-4 py-2 rounded-full text-sm font-medium transition-colors hover:bg-gray-100">
                    訂單管理
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 p-4 md:p-6 max-w-4xl mx-auto w-full">
        <!-- 提示訊息 -->
        <div id="message-box" class="hidden mb-4 p-4 rounded-lg text-white text-center animate-bounce"></div>

        <!-- 點餐頁面 -->
        <div id="view-menu" class="space-y-8">
            <section>
                <h2 class="text-lg font-bold mb-4 border-l-4 border-orange-500 pl-3">精選飯類</h2>
                <div id="rice-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4 border-l-4 border-orange-500 pl-3">美味麵食</h2>
                <div id="noodles-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>
        </div>

        <!-- 管理頁面 -->
        <div id="view-admin" class="hidden space-y-4">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="clipboard-list" class="w-6 h-6"></i> 歷史訂單
            </h2>
            <div id="orders-list" class="space-y-4">
                <div class="text-center py-12 text-gray-500">載入中...</div>
            </div>
        </div>
    </main>

    <!-- 底部購物車欄 -->
    <div id="cart-footer" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-2xl z-30 animate-slide-up">
        <div class="max-w-4xl mx-auto flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <i data-lucide="shopping-basket" class="w-8 h-8 text-orange-600"></i>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">總金額</p>
                        <p id="cart-total" class="text-xl font-bold text-orange-600">$0</p>
                    </div>
                </div>
                <button onclick="submitOrder()" id="btn-submit" class="bg-orange-600 text-white px-8 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-orange-700 active:scale-95 transition-all">
                    送出訂單 <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </div>
            <!-- 購物車清單 -->
            <div id="cart-items" class="max-h-32 overflow-y-auto space-y-2 border-t pt-2"></div>
        </div>
    </div>

    <!-- 底部緩衝 -->
    <div id="footer-spacer" class="hidden h-48"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, Timestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // 配置區
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'order-system-app';

        const MENU_DATA = {
            rice: [
                { id: 'r1', name: '泰式越香雞飯', price: 125 },
                { id: 'r2', name: '椰汁咖哩雞飯', price: 120 },
                { id: 'r3', name: '打拋豬肉飯', price: 100 },
                { id: 'r4', name: '日式燒肉飯', price: 115 },
                { id: 'r5', name: '蜜汁豬排飯', price: 100 },
                { id: 'r6', name: '香雞排飯(椒麻/泰式)', price: 110 },
                { id: 'r7', name: '椒麻雞排飯', price: 120 },
                { id: 'r8', name: '控肉飯', price: 100 },
            ],
            noodles: [
                { id: 'n1', name: '越式牛肉河粉', price: 120 },
                { id: 'n2', name: '海鮮什錦河粉', price: 120 },
                { id: 'n3', name: '海鮮什錦麵', price: 110 },
                { id: 'n4', name: '時蔬雞絲麵', price: 100 },
                { id: 'n5', name: '咖哩烏龍麵(牛/豬)', price: 100 },
                { id: 'n6', name: '咖啡椰香烏龍麵', price: 110 },
                { id: 'n7', name: '雞肉乾拌河粉', price: 100 },
            ]
        };

        // 狀態管理
        let currentUser = null;
        let cart = {};

        // 初始化
        window.onload = () => {
            renderMenu();
            lucide.createIcons();
            
            signInAnonymously(auth).catch(console.error);
            onAuthStateChanged(auth, user => {
                currentUser = user;
                if(user) listenToOrders();
            });
        };

        // 切換視圖
        window.switchView = (view) => {
            const menu = document.getElementById('view-menu');
            const admin = document.getElementById('view-admin');
            const btnMenu = document.getElementById('btn-menu');
            const btnAdmin = document.getElementById('btn-admin');

            if(view === 'menu') {
                menu.classList.remove('hidden');
                admin.classList.add('hidden');
                btnMenu.classList.add('bg-orange-600', 'text-white');
                btnAdmin.classList.remove('bg-orange-600', 'text-white');
            } else {
                menu.classList.add('hidden');
                admin.classList.remove('hidden');
                btnAdmin.classList.add('bg-orange-600', 'text-white');
                btnMenu.classList.remove('bg-orange-600', 'text-white');
            }
        };

        // 渲染菜單
        function renderMenu() {
            const riceContainer = document.getElementById('rice-list');
            const noodleContainer = document.getElementById('noodles-list');

            MENU_DATA.rice.forEach(item => {
                riceContainer.innerHTML += createMenuItem(item);
            });
            MENU_DATA.noodles.forEach(item => {
                noodleContainer.innerHTML += createMenuItem(item);
            });
        }

        function createMenuItem(item) {
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center group">
                    <div>
                        <h3 class="font-medium text-gray-800">${item.name}</h3>
                        <p class="text-orange-600 font-bold mt-1">$${item.price}</p>
                    </div>
                    <button onclick="addToCart('${item.id}', '${item.name}', ${item.price})" class="bg-orange-50 text-orange-600 p-2 rounded-lg hover:bg-orange-600 hover:text-white transition-all active:scale-90">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
            `;
        }

        // 購物車邏輯
        window.addToCart = (id, name, price) => {
            if(cart[id]) {
                cart[id].quantity += 1;
            } else {
                cart[id] = { id, name, price, quantity: 1 };
            }
            updateCartUI();
        };

        window.removeFromCart = (id) => {
            if(cart[id].quantity > 1) {
                cart[id].quantity -= 1;
            } else {
                delete cart[id];
            }
            updateCartUI();
        };

        function updateCartUI() {
            const footer = document.getElementById('cart-footer');
            const spacer = document.getElementById('footer-spacer');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            const itemsList = document.getElementById('cart-items');

            const itemsArray = Object.values(cart);
            if(itemsArray.length === 0) {
                footer.classList.add('hidden');
                spacer.classList.add('hidden');
                return;
            }

            footer.classList.remove('hidden');
            spacer.classList.remove('hidden');
            
            let totalQty = 0;
            let totalPrice = 0;
            itemsList.innerHTML = '';

            itemsArray.forEach(item => {
                totalQty += item.quantity;
                totalPrice += (item.price * item.quantity);
                itemsList.innerHTML += `
                    <div class="flex justify-between items-center text-sm bg-gray-50 p-2 rounded">
                        <span>${item.name}</span>
                        <div class="flex items-center gap-3">
                            <button onclick="removeFromCart('${item.id}')" class="p-1 rounded-full bg-gray-200"><i data-lucide="minus" class="w-3 h-3"></i></button>
                            <span class="font-bold w-4 text-center">${item.quantity}</span>
                            <button onclick="addToCart('${item.id}')" class="p-1 rounded-full bg-gray-200"><i data-lucide="plus" class="w-3 h-3"></i></button>
                        </div>
                    </div>
                `;
            });

            count.innerText = totalQty;
            total.innerText = `$${totalPrice}`;
            lucide.createIcons();
        }

        // 送出訂單
        window.submitOrder = async () => {
            if(!currentUser) return;
            const items = Object.values(cart);
            const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                    items: items,
                    total: total,
                    timestamp: Timestamp.now(),
                    userId: currentUser.uid,
                    status: 'pending'
                });
                cart = {};
                updateCartUI();
                showMessage('訂單已成功送出！', 'success');
            } catch (e) {
                showMessage('送出失敗，請重試。', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '送出訂單 <i data-lucide="chevron-right" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        };

        // 監聽訂單
        function listenToOrders() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('orders-list');
                list.innerHTML = '';
                const sortedDocs = snapshot.docs
                    .map(d => ({id: d.id, ...d.data()}))
                    .sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                if(sortedDocs.length === 0) {
                    list.innerHTML = '<div class="text-center py-12 text-gray-500">目前尚無訂單</div>';
                    return;
                }

                sortedDocs.forEach(order => {
                    const date = order.timestamp?.toDate().toLocaleString() || '未知時間';
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-xs text-gray-400">訂單: ${order.id.slice(-6)}</span>
                                    <p class="text-sm text-gray-500">${date}</p>
                                </div>
                                <span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs font-bold">處理中</span>
                            </div>
                            <div class="space-y-1 my-3 text-sm">
                                ${order.items.map(i => `<div class="flex justify-between"><span>${i.name} x ${i.quantity}</span><span>$${i.price * i.quantity}</span></div>`).join('')}
                            </div>
                            <div class="border-t pt-2 flex justify-between font-bold">
                                <span>總計</span>
                                <span class="text-orange-600">$${order.total}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function showMessage(text, type) {
            const box = document.getElementById('message-box');
            box.innerText = text;
            box.className = `mb-4 p-4 rounded-lg text-white text-center animate-bounce ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
